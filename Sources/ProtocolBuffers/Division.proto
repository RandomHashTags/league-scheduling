syntax = "proto3";

package lit_leagues.leagues;

import "Byes.proto";
import "DivisionMatchupDurations.proto";
import "DivisionOpponents.proto";
import "GameDays.proto";
import "GameDayLocations.proto";
import "GameDayTimes.proto";
import "GameGaps.proto";
import "LocationTimeExclusivities.proto";
import "LocationTravelDurations.proto";

// The ID for this division is its index in the array, located in the settings.
// 
// - A `nil` setting will use the default schedule's value for the specific game day.
message Division {

    // Custom name for this division.
    optional string name = 1;

    // 0...255
    optional uint32 dayOfWeek = 2;

    // Game days this division can play on.
    // 
    // All entries in this division will play on these game days.
    optional GameDays gameDays = 3;

    // Day indexes where the entries in this division don't play due to being on a bye week.
    optional Byes byes = 4;

    // Game gaps for specific game days.
    optional GameGaps gameGaps = 5;

    // Times this division can play at for a specific day index.
    optional GameDayTimes gameDayTimes = 6;

    // Locations this division can play at for a specific day index.
    optional GameDayLocations gameDayLocations = 7;

    // Game day matchup durations for this division.
    optional DivisionMatchupDurations matchupDurations = 8;

    // Times the locations are available to host matchups.
    optional LocationTimeExclusivities locationTimeExclusivities = 9;

    // Duration it takes to travel from one location to another.
    optional LocationTravelDurations travelDurations = 10;

    // List of division ids the entries in this division can play against.
    optional DivisionOpponents opponents = 11;

    // Maximum number of times an entry in this division can play against another entry.
    optional uint32 maxSameOpponentMatchups = 12;
}