syntax = "proto3";

package lit_leagues.leagues;

import "DaySettingsArray.proto";
import "Divisions.proto";
import "Entry.proto";
import "GeneralSettings.proto";

// The payload sent by clients to the server requesting to generate a schedule with the given settings.
message RequestPayload {
    // A string in the html date format representing the first date to schedule matchups.
    optional string starts = 1;

    // Number of days where matchups are played.
    uint32 gameDays = 2;

    // Default schedule settings.
    GeneralSettings settings = 3;

    // Game day schedule settings.
    optional DaySettingsArray individualDaySettings = 4;

    // The divisions being scheduled, including their settings. If `nil`: divisions == 1.
    optional Divisions divisions = 5;

    // The entries/teams being scheduled, including their settings.
    repeated Entry entries = 6;
}