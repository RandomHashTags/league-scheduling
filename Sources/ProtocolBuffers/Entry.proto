syntax = "proto3";

package lit_leagues.leagues;

import "Byes.proto";
import "EntryHomeLocations.proto";
import "EntryMatchupsPerGameDay.proto";
import "GameDays.proto";
import "GameDayLocations.proto";
import "GameDayTimes.proto";

// The ID for this entry is its index in the array, located in the settings.
//
// Person or team that will participate in a League.
message Entry {

    // Custom name for this entry.
    optional string name = 1;

    // Division id this entry is in. If `nil`: division == 0.
    optional uint32 division = 2;

    // Game days this entry can play on.
    optional GameDays gameDays = 3;

    // Times this entry can play at for a specific day index.
    optional GameDayTimes gameDayTimes = 4;

    // Locations this entry can play at for a specific day index.
    optional GameDayLocations gameDayLocations = 5;

    // Home locations for this entry.
    optional EntryHomeLocations homeLocations = 6;

    // Day indexes where this entry doesn't play due to being on a bye week.
    optional Byes byes = 7;

    // Custom number of matchups this entry plays on a given game day.
    optional EntryMatchupsPerGameDay matchupsPerGameDay = 8;
}

